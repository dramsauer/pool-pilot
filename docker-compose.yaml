services:
  pool-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pool-water-balance
    ports:
      - "8501:8501"
    volumes:
      - pool_data:/app/data
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true

volumes:
  pool_data:
