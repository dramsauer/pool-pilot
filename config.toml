[pool]
name = "Lay-Z-Spa Ibiza"
volume_liter = 1000
pool_type = "chlorine"

[targets]
ph_min = 7.2
ph_max = 7.6
chlorine_min = 0.5
chlorine_max = 3.0
alkalinity_min = 80
alkalinity_max = 120
hardness_min = 150
hardness_max = 250
temperature_default = 35

[parameters]
  [parameters.ph]
  display_name = "pH-Wert"
  unit = ""
  default_value = 7.4
  sort_order = 10
  [parameters.chlorine]
  display_name = "Freies Chlor"
  unit = "mg/L"
  default_value = 1.5
  sort_order = 20
  [parameters.alkalinity]
  display_name = "Gesamtalkalinität"
  unit = "mg/L CaCO₃"
  default_value = 100
  sort_order = 30
  [parameters.hardness]
  display_name = "Gesamthärte"
  unit = "mg/L CaCO₃"
  default_value = 200
  sort_order = 40
  [parameters.cya]
  display_name = "Cyanursäure"
  unit = "mg/L"
  default_value = 0
  sort_order = 50
  [parameters.bromine]
  display_name = "Brom"
  unit = "mg/L"
  default_value = 0
  sort_order = 60
  [parameters.salt]
  display_name = "Salzgehalt (TDS)"
  unit = "mg/L NaCl"
  default_value = 500
  sort_order = 70
  [parameters.oxygen]
  display_name = "Sauerstoff"
  unit = "mg/L"
  default_value = 0
  sort_order = 80

[products]
  [products.ph_minus]
  name = "Summer Fun pH-Minus Granulat"
  typ = "ph_minus"
  dosage_factor = 1.4
  unit = "g"
  interval_days = 0

  [products.ph_plus]
  name = "Summer Fun pH-Plus Granulat"
  typ = "ph_plus"
  dosage_factor = 0.74
  unit = "g"
  interval_days = 0

  [products.chlorine_tabs]
  name = "Summer Fun Perfect Care Tabs 20g"
  typ = "chlorine"
  dosage_factor = 0
  unit = "Tablette(n)"
  active_chlorine_per_tab = 18.0
  interval_days = 7

[trinkwasser]
  [trinkwasser.stamsried]
  name = "Stamsried – Kreiswerke Cham (03/2025)"
  ph_default = 7.5
  alkalinity_default = 145.0
  calcium_hardness_default = 185.0
  notes = "Quelle: Trinkwasseranalyse 27.03.2025, Labor Kneißler"

[instruments]
  [instruments.summer_fun_teststreifen]
  name = "Summer Fun Teststreifen"
  brand = "Summer Fun"
  capabilities = ["ph", "chlorine", "bromine"]
  notes = "3-in-1: pH, Chlor, Brom"

  [instruments.pool_total_5in1]
  name = "POOL Total 5 in 1"
  brand = "POOL"
  capabilities = ["ph", "chlorine", "alkalinity", "hardness", "cya"]
  notes = "5 Parameter: pH, Chlor, Alk, CYA, Härte"

[task_defaults]
templates = [
  { name = "Hygiene-Messung (pH/Chlor)", category = "chemie", interval_days = 7, pool_type = "all", icon = "🧪" },
  { name = "Vollanalyse (alle Werte)", category = "chemie", interval_days = 14, pool_type = "all", icon = "📊" },
  { name = "Chlor Tablette zugeben", category = "chemie", interval_days = 7, pool_type = "chlorine", icon = "💊", product_name = "Summer Fun Perfect Care Tabs 20g" },
  { name = "Schockchlorung", category = "chemie", interval_days = 28, pool_type = "chlorine", icon = "⚡" },
  { name = "Filter rückspülen", category = "technik", interval_days = 14, pool_type = "all", icon = "🔄" },
  { name = "Filterpatrone reinigen", category = "technik", interval_days = 7, pool_type = "all", icon = "🧽" },
  { name = "Pumpenvorsieb reinigen", category = "technik", interval_days = 7, pool_type = "all", icon = "🔧" },
  { name = "Skimmer reinigen", category = "reinigung", interval_days = 7, pool_type = "all", icon = "🧹" },
  { name = "Poolboden saugen", category = "reinigung", interval_days = 14, pool_type = "all", icon = "🫧" },
  { name = "Abdeckung reinigen", category = "reinigung", interval_days = 14, pool_type = "all", icon = "🛡️" },
  { name = "Wasserstand prüfen", category = "allgemein", interval_days = 7, pool_type = "all", icon = "📏" },
  { name = "Wasserwechsel (Teilweise)", category = "allgemein", interval_days = 28, pool_type = "all", icon = "💧" },
]
